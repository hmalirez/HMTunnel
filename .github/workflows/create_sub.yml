name: Create SUB File with Python

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SUB file with Python
        run: |
          python3 << EOF
          import os
          import uuid
          import struct
          import json

          # لینک‌های سابسکریپشن خود را اینجا قرار دهید
          subscriptions = [
              {"remarks": "My Config 1", "url": "https://raw.githubusercontent.com/hmalirez/Page/refs/heads/main/iran1.txt"},
              {"remarks": "My Config 2", "url": "https://raw.githubusercontent.com/hmalirez/Page/refs/heads/main/iran2.txt"},
              {"remarks": "My Config 3", "url": "https://raw.githubusercontent.com/hmalirez/Page/refs/heads/main/iran3.txt"}
          ]

          output_path = "V2rayNG/app/src/main/assets/mmkv/SUB"
          os.makedirs(os.path.dirname(output_path), exist_ok=True)

          with open(output_path, "wb") as f:
              for sub in subscriptions:
                  guid = uuid.uuid4().hex
                  data = {
                      "remarks": sub["remarks"],
                      "url": sub["url"],
                      "enabled": True,
                      "addedTime": 1775813540349,  # یک مقدار ثابت
                      "lastUpdated": -1,
                      "autoUpdate": True,
                      "filter": "",
                      "allowInsecureUrl": False,
                      "userAgent": ""
                  }
                  json_str = json.dumps(data, separators=(',', ':'))
                  
                  key_bytes = guid.encode('utf-8')
                  value_bytes = json_str.encode('utf-8')
                  
                  f.write(struct.pack('>i', len(key_bytes)))
                  f.write(key_bytes)
                  f.write(struct.pack('>i', len(value_bytes)))
                  f.write(value_bytes)

          print(f"✅ SUB file created successfully at: {output_path}")
          EOF

      - name: Upload SUB file
        uses: actions/upload-artifact@v4
        with:
          name: SUB-file
          path: V2rayNG/app/src/main/assets/mmkv/SUB
